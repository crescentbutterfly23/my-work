<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project · Crescent Butterfly</title>
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site">
  <a class="lockup" href="index.html" aria-label="Crescent Butterfly home">
    <img class="mark" src="assets/mark_embossed.png" alt="" />
    <img class="word" src="assets/wordmark_embossed.png" alt="Crescent Butterfly, Graphic Design" />
  </a>
  <nav>
    <a href="work.html">Work</a>
    <a href="services.html">Services</a>
    <a class="nav-cta" href="start.html">Start a project</a>
  </nav>
</header>

<article class="project" id="project">
  <div class="project-hero">
    <span class="eyebrow" id="pMeta"></span>
    <h1 id="pTitle">Loading…</h1>
    <p class="lede" id="pDesc"></p>
  </div>
  <div class="project-body" id="pBody"></div>

  <nav class="pnav" id="pNav" aria-label="More projects"></nav>

  <aside class="project-next">
    <p>Like where this is going?</p>
    <a class="btn" href="start.html">Start a project</a>
    <a class="backlink" href="work.html">Back to the work</a>
  </aside>
</article>

<footer class="site">
  © <span id="yr"></span> Crescent Butterfly Graphic Design · Natalie Cruz Serrat ·
  <a href="mailto:crescentbutterfly23@gmail.com">crescentbutterfly23@gmail.com</a>
</footer>

<script src="shared.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const id = params.get("id");

  // ?preview=1 comes from project-edit.html — render the unpublished draft
  // so you can see block changes before committing them.
  let projects = null;
  if (params.has("preview")) {
    try {
      const draft = JSON.parse(localStorage.getItem("cb-desk-draft"));
      if (Array.isArray(draft)) projects = draft;
    } catch { /* no usable draft — fall back to the published file */ }
  }
  if (!projects) projects = await loadProjects();
  const idx = Math.max(0, projects.findIndex((x) => x.id === id));
  const p = projects[idx];
  if (!p) {
    document.getElementById("pTitle").textContent = "Project not found";
    return;
  }
  document.title = `${p.title} · Crescent Butterfly`;

  // per-project design system: the story dresses in the project's brand
  if (p.theme) {
    const t = p.theme;
    const root = document.body;
    root.classList.add("themed");
    if (t.background) root.style.setProperty("--t-bg", t.background);
    if (t.surface) root.style.setProperty("--t-surface", t.surface);
    if (t.accent) root.style.setProperty("--t-accent", t.accent);
    if (t.text) root.style.setProperty("--t-text", t.text);
    const loadFont = (fam, varName) => {
      if (!fam) return;
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fam).replace(/%20/g, "+")}:wght@300;400;500&display=swap`;
      document.head.appendChild(link);
      root.style.setProperty(varName, `"${fam}", "Poppins", sans-serif`);
    };
    loadFont(t.headingFont, "--t-font-heading");
    loadFont(t.bodyFont, "--t-font-body");
  }

  document.getElementById("pMeta").textContent = [p.category, p.year].filter(Boolean).join(" · ");
  document.getElementById("pTitle").textContent = p.title;
  document.getElementById("pDesc").textContent = p.description || "";

  // storytelling flow: cover first, then the presentation blocks in order
  const body = document.getElementById("pBody");

  // the cover is the LCP element: load it eagerly
  if (p.image) {
    const cover = document.createElement("figure");
    cover.className = "pfig full reveal";
    cover.innerHTML = `<img alt="" fetchpriority="high">`;
    cover.querySelector("img").src = p.image;
    cover.querySelector("img").alt = p.title;
    body.appendChild(cover);
  }

  const figure = (src, width, caption) => {
    const f = document.createElement("figure");
    f.className = `pfig reveal ${width || "full"}`;
    const img = document.createElement("img");
    img.loading = "lazy";
    img.src = src;
    img.alt = caption || p.title;
    f.appendChild(img);
    if (caption) {
      const c = document.createElement("figcaption");
      c.textContent = caption;
      f.appendChild(c);
    }
    return f;
  };

  const textEl = (style, text) => {
    if (style === "heading") {
      const h = document.createElement("h2");
      h.className = "pblock-head reveal";
      h.textContent = text;
      return h;
    }
    const el = document.createElement("p");
    el.className = "prose reveal" + (style === "lead" ? " lead" : "");
    el.textContent = text;
    return el;
  };

  // Blocks are authored in project-edit.html:
  //   text  { style: heading|lead|body }
  //   image { width: third|half|full, caption }
  //   split { width: third|half, side: left|right }  — image beside text
  //   grid  { images: [] }
  function renderBlock(b) {
    if (b.type === "text" && b.text) return textEl(b.style, b.text);

    if (b.type === "image" && b.image) return figure(b.image, b.width || "full", b.caption);

    if (b.type === "split" && (b.image || b.text)) {
      const wrap = document.createElement("div");
      wrap.className =
        `psplit reveal w-${b.width || "half"}` + (b.side === "right" ? " img-right" : "");
      if (b.image) {
        const media = figure(b.image, "fill", b.caption);
        media.classList.add("psplit-media");
        wrap.appendChild(media);
      }
      const col = document.createElement("div");
      col.className = "psplit-text";
      if (b.text) col.appendChild(textEl(b.style, b.text));
      wrap.appendChild(col);
      return wrap;
    }

    if (b.type === "grid" && Array.isArray(b.images) && b.images.length) {
      const g = document.createElement("div");
      g.className = "pgallery reveal";
      b.images.filter(Boolean).forEach((src) => g.appendChild(figure(src, "fill")));
      return g;
    }
    return null;
  }

  let blocks = p.blocks;
  if (!Array.isArray(blocks) || !blocks.length) {
    // legacy shape: story paragraphs woven with gallery images
    const paras = (p.story || p.description || "").split(/\n\s*\n/).filter(Boolean);
    const gallery = [...(p.gallery || [])];
    blocks = [];
    paras.forEach((t, i) => {
      blocks.push({ type: "text", text: t, style: i === 0 ? "lead" : "body" });
      if (gallery.length && i < paras.length - 1) blocks.push({ type: "image", image: gallery.shift() });
    });
    gallery.forEach((g) => blocks.push({ type: "image", image: g }));
  }
  blocks.forEach((b) => {
    const el = renderBlock(b);
    if (el) body.appendChild(el);
  });

  // the full case study still lives on Behance — offer it, don't force it
  if (p.behance) {
    const a = document.createElement("a");
    a.className = "behance-link reveal";
    a.href = p.behance;
    a.target = "_blank";
    a.rel = "noopener";
    a.textContent = "See the full case study on Behance ↗";
    body.appendChild(a);
  }

  // previous / next story
  const nav = document.getElementById("pNav");
  const prev = projects[idx - 1], next = projects[idx + 1];
  nav.innerHTML =
    (prev ? `<a href="project.html?id=${encodeURIComponent(prev.id)}">&larr; ${prev.title}</a>` : "<span></span>") +
    (next ? `<a href="project.html?id=${encodeURIComponent(next.id)}">${next.title} &rarr;</a>` : "<span></span>");

  observeReveals();
})();
</script>
</body>
</html>
