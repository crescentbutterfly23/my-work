<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project · Crescent Butterfly</title>
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="site">
  <a class="lockup" href="index.html" aria-label="Crescent Butterfly home">
    <img class="mark" src="assets/mark_embossed.png" alt="" />
    <img class="word" src="assets/wordmark_embossed.png" alt="Crescent Butterfly, Graphic Design" />
  </a>
  <nav>
    <a href="work.html">Work</a>
    <a href="services.html">Services</a>
    <a class="nav-cta" href="start.html">Start a project</a>
  </nav>
</header>

<article class="project" id="project">
  <div class="project-hero">
    <span class="eyebrow" id="pMeta"></span>
    <h1 id="pTitle">Loading…</h1>
    <p class="lede" id="pDesc"></p>
  </div>
  <div class="project-body" id="pBody"></div>

  <nav class="pnav" id="pNav" aria-label="More projects"></nav>

  <aside class="project-next">
    <p>Like where this is going?</p>
    <a class="btn" href="start.html">Start a project</a>
    <a class="backlink" href="work.html">Back to the work</a>
  </aside>
</article>

<footer class="site">
  © <span id="yr"></span> Crescent Butterfly Graphic Design · Natalie Cruz Serrat ·
  <a href="mailto:crescentbutterfly23@gmail.com">crescentbutterfly23@gmail.com</a>
</footer>

<script src="shared.js"></script>
<script>
(async () => {
  const id = new URLSearchParams(location.search).get("id");
  const projects = await loadProjects();
  const idx = Math.max(0, projects.findIndex((x) => x.id === id));
  const p = projects[idx];
  if (!p) {
    document.getElementById("pTitle").textContent = "Project not found";
    return;
  }
  document.title = `${p.title} · Crescent Butterfly`;

  // per-project design system: the story dresses in the project's brand
  if (p.theme) {
    const t = p.theme;
    const root = document.body;
    root.classList.add("themed");
    if (t.background) root.style.setProperty("--t-bg", t.background);
    if (t.surface) root.style.setProperty("--t-surface", t.surface);
    if (t.accent) root.style.setProperty("--t-accent", t.accent);
    if (t.text) root.style.setProperty("--t-text", t.text);
    const loadFont = (fam, varName) => {
      if (!fam) return;
      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(fam).replace(/%20/g, "+")}:wght@300;400;500&display=swap`;
      document.head.appendChild(link);
      root.style.setProperty(varName, `"${fam}", "Poppins", sans-serif`);
    };
    loadFont(t.headingFont, "--t-font-heading");
    loadFont(t.bodyFont, "--t-font-body");
  }

  document.getElementById("pMeta").textContent = [p.category, p.year].filter(Boolean).join(" · ");
  document.getElementById("pTitle").textContent = p.title;
  document.getElementById("pDesc").textContent = p.description || "";

  // storytelling flow: cover first, then the presentation blocks in order
  const body = document.getElementById("pBody");
  const addFig = (src, wide) => {
    const f = document.createElement("figure");
    f.className = "pfig reveal" + (wide ? " wide" : "");
    // the cover is the LCP element: load it eagerly, lazy-load the rest
    f.innerHTML = wide ? `<img alt="" fetchpriority="high">` : `<img loading="lazy" alt="">`;
    f.querySelector("img").src = src;
    f.querySelector("img").alt = p.title;
    body.appendChild(f);
  };
  const addPara = (text, lead) => {
    const el = document.createElement("p");
    el.className = "prose reveal" + (lead ? " lead" : "");
    el.textContent = text;
    body.appendChild(el);
  };

  addFig(p.image, true);

  let blocks = p.blocks;
  if (!Array.isArray(blocks) || !blocks.length) {
    // legacy shape: story paragraphs woven with gallery images
    const paras = (p.story || p.description || "").split(/\n\s*\n/).filter(Boolean);
    const gallery = [...(p.gallery || [])];
    blocks = [];
    paras.forEach((t, i) => {
      blocks.push({ type: "text", text: t });
      if (gallery.length && i < paras.length - 1) blocks.push({ type: "image", image: gallery.shift() });
    });
    gallery.forEach((g) => blocks.push({ type: "image", image: g }));
  }
  let firstText = true;
  for (const b of blocks) {
    if (b.type === "text") { addPara(b.text, firstText); firstText = false; }
    else if (b.type === "image") addFig(b.image, false);
  }

  // previous / next story
  const nav = document.getElementById("pNav");
  const prev = projects[idx - 1], next = projects[idx + 1];
  nav.innerHTML =
    (prev ? `<a href="project.html?id=${encodeURIComponent(prev.id)}">&larr; ${prev.title}</a>` : "<span></span>") +
    (next ? `<a href="project.html?id=${encodeURIComponent(next.id)}">${next.title} &rarr;</a>` : "<span></span>");

  observeReveals();
})();
</script>
</body>
</html>
