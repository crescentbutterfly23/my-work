[build]
  publish = "site"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/projects"
  to = "/.netlify/functions/projects"
  status = 200

[[redirects]]
  from = "/api/inquiries"
  to = "/.netlify/functions/inquiries"
  status = 200

[[redirects]]
  from = "/api/image/*"
  to = "/.netlify/functions/image/:splat"
  status = 200

# keep the admin page out of search engines
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
