<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start a project · Crescent Butterfly</title>
  <meta name="description" content="Tell Crescent Butterfly about your project: a short quiz so the first conversation starts in the right place." />
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/corporate.css" />
</head>
<body>

<header class="site">
  <a class="lockup" href="index-corporate.html" aria-label="Crescent Butterfly home">
    <img src="assets/mark_embossed.png" alt="" />
    <span class="word">Crescent Butterfly</span>
  </a>
  <nav>
    <a class="link" href="work-corporate.html">Work</a>
    <a class="link" href="services-corporate.html">Services</a>
    <a class="btn" href="start-corporate.html">Start a project</a>
  </nav>
</header>

<div class="quiz-wrap">
  <span class="eyebrow">Start a project</span>
  <div class="progress" id="progress" aria-hidden="true"></div>
  <div id="quiz"></div>
</div>

<footer class="site">
  <span>© <span id="yr"></span> Crescent Butterfly Graphic Design · Natalie Cruz Serrat</span>
  <a href="mailto:crescentbutterfly23@gmail.com">crescentbutterfly23@gmail.com</a>
</footer>

<script src="js/corporate.js"></script>
<script>
const answers = { services: [], stage: "", timeline: "", budget: "", message: "", name: "", email: "" };
const steps = [
  { key: "services", multi: true, q: "What are we making?", sub: "Pick everything that applies. Not sure is a perfectly good answer.", options: ["Brand identity", "Print design", "Digital & social", "Not sure yet"] },
  { key: "stage", q: "Where is your brand today?", sub: "So I know whether we're building, growing or refreshing.", options: ["Brand new, starting from zero", "Has a logo, needs a real system", "Established, wants a refresh", "Just this one project"] },
  { key: "timeline", q: "When do you need it?", sub: "Honest timelines make better work.", options: ["As soon as possible", "Within a month", "One to three months", "Flexible, quality first"] },
  { key: "budget", q: "What's the budget neighborhood?", sub: "A range is enough. It shapes what I recommend, never the care it gets.", options: ["Under $500", "$500 to $1,500", "$1,500 to $5,000", "Let's talk about it"] },
  { key: "message", type: "text", q: "Tell me the story.", sub: "What are you building, who is it for, and what should people feel when they see it?" },
  { key: "contact", type: "contact", q: "Where do I reply?", sub: "I answer every inquiry personally, usually within two days." },
];

let step = 0;
const quiz = document.getElementById("quiz");
const progress = document.getElementById("progress");
progress.innerHTML = steps.map(() => "<i></i>").join("");

function renderStep() {
  progress.querySelectorAll("i").forEach((el, i) => el.classList.toggle("done", i <= step));
  const st = steps[step];
  const back = step > 0 ? `<button class="back" type="button" id="backBtn">&larr; Back</button>` : "";
  let body = "";
  if (st.type === "text") {
    body = `<textarea id="field" rows="6" maxlength="3000" placeholder="Write as much or as little as you like…">${answers.message}</textarea>
      <div class="qnav"><button class="btn" id="nextBtn">Continue</button>${back}</div>`;
  } else if (st.type === "contact") {
    body = `
      <label for="name">Your name *</label><input id="name" maxlength="120" value="${answers.name.replace(/"/g, "&quot;")}" />
      <label for="email">Email *</label><input id="email" type="email" maxlength="160" value="${answers.email.replace(/"/g, "&quot;")}" />
      <p class="qmsg" id="qmsg"></p>
      <div class="qnav"><button class="btn" id="nextBtn">Send inquiry</button>${back}</div>`;
  } else {
    body = `<div class="choices">${st.options
      .map((o) => {
        const picked = st.multi ? answers.services.includes(o) : answers[st.key] === o;
        return `<button type="button" data-o="${o.replace(/"/g, "&quot;")}" class="${picked ? "picked" : ""}">${o}</button>`;
      })
      .join("")}</div>
      <p class="qmsg" id="qmsg"></p>
      <div class="qnav">${st.multi ? `<button class="btn" id="nextBtn">Continue</button>` : ""}${back}</div>`;
  }
  quiz.innerHTML = `<div class="qcard"><h2>${st.q}</h2><p class="sub">${st.sub}</p>${body}</div>`;

  quiz.querySelectorAll(".choices button").forEach((b) =>
    b.addEventListener("click", () => {
      const o = b.dataset.o;
      if (st.multi) {
        const arr = answers.services;
        arr.includes(o) ? arr.splice(arr.indexOf(o), 1) : arr.push(o);
        b.classList.toggle("picked");
      } else { answers[st.key] = o; next(); }
    })
  );
  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) nextBtn.addEventListener("click", next);
  const backBtn = document.getElementById("backBtn");
  if (backBtn) backBtn.addEventListener("click", () => { step--; renderStep(); });
}

async function next() {
  const st = steps[step];
  const msg = document.getElementById("qmsg");
  if (st.multi && !answers.services.length) { msg.textContent = "Pick at least one, or choose Not sure yet."; return; }
  if (st.type === "text") answers.message = document.getElementById("field").value.trim();
  if (st.type === "contact") {
    answers.name = document.getElementById("name").value.trim();
    answers.email = document.getElementById("email").value.trim();
    if (!answers.name || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(answers.email)) { msg.textContent = "I need a name and a working email to reply."; return; }
    // Static host — no backend. Compose the brief into an email instead.
    const mailto = buildBriefMailto(answers);
    progress.style.display = "none";
    quiz.innerHTML = `
      <div class="done-card">
        <img src="assets/mark_embossed.png" alt="" />
        <h2>One last step.</h2>
        <p>Thank you, ${answers.name.split(" ")[0]} — your brief is ready to send. The button opens it in
           your email client, already filled in.</p>
        <a class="btn" href="${mailto}">Send my brief →</a>
        <p style="margin-top:1.4rem"><a class="btn ghost" href="work-corporate.html">Browse the work meanwhile</a></p>
      </div>`;
    return;
  }
  step++;
  renderStep();
}
renderStep();
</script>
</body>
</html>
