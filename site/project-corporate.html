<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project · Crescent Butterfly</title>
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/corporate.css" />
</head>
<body>

<header class="site">
  <a class="lockup" href="index-corporate.html" aria-label="Crescent Butterfly home">
    <img src="assets/mark_embossed.png" alt="" />
    <span class="word">Crescent Butterfly</span>
  </a>
  <nav>
    <a class="link" href="work-corporate.html">Work</a>
    <a class="link" href="services-corporate.html">Services</a>
    <a class="btn" href="start-corporate.html">Start a project</a>
  </nav>
</header>

<article class="project" id="project">
  <div class="project-hero">
    <span class="eyebrow" id="pMeta"></span>
    <h1 id="pTitle">Loading…</h1>
    <p class="lede" id="pDesc"></p>
  </div>
  <div class="project-body" id="pBody"></div>

  <nav class="pnav" id="pNav" aria-label="More projects"></nav>

  <aside class="project-next">
    <p>Like where this is going?</p>
    <a class="btn" href="start-corporate.html">Start a project →</a>
    <a class="backlink" href="work-corporate.html">Back to the work</a>
  </aside>
</article>

<footer class="site">
  <span>© <span id="yr"></span> Crescent Butterfly Graphic Design · Natalie Cruz Serrat</span>
  <a href="mailto:crescentbutterfly23@gmail.com">crescentbutterfly23@gmail.com</a>
</footer>

<script src="js/corporate.js"></script>
<script>
(async () => {
  const id = new URLSearchParams(location.search).get("id");
  const projects = await loadProjects();
  const idx = Math.max(0, projects.findIndex((x) => x.id === id));
  const p = projects[idx];
  if (!p) { document.getElementById("pTitle").textContent = "Project not found"; return; }
  document.title = `${p.title} · Crescent Butterfly`;

  document.getElementById("pMeta").textContent = [p.category, p.year].filter(Boolean).join(" · ");
  document.getElementById("pTitle").textContent = p.title;
  document.getElementById("pDesc").textContent = p.description || "";

  const body = document.getElementById("pBody");
  const addFig = (src, wide) => {
    const f = document.createElement("figure");
    f.className = "pfig reveal" + (wide ? " wide" : "");
    f.innerHTML = wide ? `<img alt="" fetchpriority="high">` : `<img loading="lazy" alt="">`;
    f.querySelector("img").src = src;
    f.querySelector("img").alt = p.title;
    body.appendChild(f);
  };
  const addPara = (text, lead) => {
    const el = document.createElement("p");
    el.className = "prose reveal" + (lead ? " lead" : "");
    el.textContent = text;
    body.appendChild(el);
  };

  addFig(p.image, true);

  let blocks = p.blocks;
  if (!Array.isArray(blocks) || !blocks.length) {
    const paras = (p.story || p.description || "").split(/\n\s*\n/).filter(Boolean);
    const gallery = [...(p.gallery || [])];
    blocks = [];
    paras.forEach((t, i) => {
      blocks.push({ type: "text", text: t });
      if (gallery.length && i < paras.length - 1) blocks.push({ type: "image", image: gallery.shift() });
    });
    gallery.forEach((g) => blocks.push({ type: "image", image: g }));
  }
  let firstText = true;
  for (const b of blocks) {
    if (b.type === "text") { addPara(b.text, firstText); firstText = false; }
    else if (b.type === "image") addFig(b.image, false);
  }

  const nav = document.getElementById("pNav");
  const prev = projects[idx - 1], next = projects[idx + 1];
  nav.innerHTML =
    (prev ? `<a href="project-corporate.html?id=${encodeURIComponent(prev.id)}">&larr; ${prev.title}</a>` : "<span></span>") +
    (next ? `<a href="project-corporate.html?id=${encodeURIComponent(next.id)}">${next.title} &rarr;</a>` : "<span></span>");

  observeReveals();
})();
</script>
</body>
</html>
