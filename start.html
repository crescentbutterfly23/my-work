<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start a project · Crescent Butterfly</title>
  <meta name="description" content="Tell Crescent Butterfly about your project: a short quiz so the first conversation starts in the right place." />
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Caveat:wght@600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .quiz-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 5vw 6rem;
      min-height: calc(100dvh - 68px - 120px);
    }
    .progress { display: flex; gap: 0.5rem; margin: 2.2rem 0 2.6rem; }
    .progress i {
      flex: 1; height: 4px; border-radius: 2px; background: var(--rose);
      transition: background 0.3s;
    }
    .progress i.done { background: var(--coral); }
    .qcard h2 { font-size: clamp(1.6rem, 3.5vw, 2.4rem); font-weight: 300; margin-bottom: 0.5rem; }
    .qcard .sub { font-weight: 300; color: var(--ink-soft); margin-bottom: 2rem; }
    .choices { display: flex; flex-wrap: wrap; gap: 0.8rem; }
    .choices button {
      font-family: inherit; font-size: 0.95rem; font-weight: 300;
      padding: 0.9rem 1.6rem; border-radius: 999px;
      border: 1.5px solid var(--rose-deep); background: #fff; color: var(--maroon);
      cursor: pointer; transition: all 0.2s var(--ease-out);
    }
    .choices button:hover { border-color: var(--crimson); color: var(--crimson); transform: translateY(-2px); }
    .choices button.picked { background: var(--crimson); border-color: var(--crimson); color: #fff; }
    .qcard textarea, .qcard input {
      width: 100%; font-family: inherit; font-size: 1rem; font-weight: 300;
      padding: 0.85rem 1rem; border: 1.5px solid var(--rose); border-radius: 12px;
      background: #fff; color: var(--maroon);
    }
    .qcard textarea:focus, .qcard input:focus { outline: 2px solid var(--coral); border-color: transparent; }
    .qcard label { display: block; font-size: 0.8rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft); margin: 1.2rem 0 0.4rem; }
    .qnav { display: flex; gap: 1rem; margin-top: 2.6rem; align-items: center; }
    .qnav .back {
      background: none; border: 0; color: var(--crimson); font-family: inherit;
      font-size: 0.85rem; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer;
    }
    .qmsg { margin-top: 1rem; color: var(--crimson); font-size: 0.9rem; }
    .done-card { text-align: center; padding-top: 3rem; }
    .done-card .done-icon { display: block; width: 104px; margin: 0 auto 1.5rem; }
    .done-card h2 { font-size: clamp(2rem, 4.5vw, 3rem); margin-bottom: 1rem; }
    .done-card p { font-weight: 300; max-width: 30rem; margin: 0 auto 2.2rem; }
  </style>
</head>
<body>

<header class="site">
  <a class="lockup" href="index.html" aria-label="Crescent Butterfly home">
    <img class="mark" src="assets/mark_embossed.png" alt="" />
    <img class="word" src="assets/wordmark_embossed.png" alt="Crescent Butterfly, Graphic Design" />
  </a>
  <nav>
    <a href="work.html">Work</a>
    <a href="services.html">Services</a>
    <a class="nav-cta" href="start.html">Start a project</a>
  </nav>
</header>

<div class="quiz-wrap">
  <span class="eyebrow">Start a project</span>
  <div class="progress" id="progress" aria-hidden="true"></div>
  <div id="quiz"></div>
</div>

<footer class="site">
  © <span id="yr"></span> Crescent Butterfly Graphic Design · Natalie Cruz Serrat ·
  <a href="mailto:crescentbutterfly23@gmail.com">crescentbutterfly23@gmail.com</a>
</footer>

<script src="shared.js"></script>
<script>
const answers = { services: [], stage: "", timeline: "", budget: "", message: "", name: "", email: "" };

const steps = [
  {
    key: "services", multi: true,
    q: "What are we making?",
    sub: "Pick everything that applies. Not sure is a perfectly good answer.",
    options: ["Brand identity", "Print design", "Digital & social", "Not sure yet"],
  },
  {
    key: "stage",
    q: "Where is your brand today?",
    sub: "So I know whether we're building, growing or refreshing.",
    options: ["Brand new, starting from zero", "Has a logo, needs a real system", "Established, wants a refresh", "Just this one project"],
  },
  {
    key: "timeline",
    q: "When do you need it?",
    sub: "Honest timelines make better work.",
    options: ["As soon as possible", "Within a month", "One to three months", "Flexible, quality first"],
  },
  {
    key: "budget",
    q: "What's the budget neighborhood?",
    sub: "A range is enough. It shapes what I recommend, never the care it gets.",
    options: ["Under $500", "$500 to $1,500", "$1,500 to $5,000", "Let's talk about it"],
  },
  { key: "message", type: "text", q: "Tell me the story.", sub: "What are you building, who is it for, and what should people feel when they see it?" },
  { key: "contact", type: "contact", q: "Where do I reply?", sub: "I answer every inquiry personally, usually within two days." },
];

let step = 0;
const quiz = document.getElementById("quiz");
const progress = document.getElementById("progress");
progress.innerHTML = steps.map(() => "<i></i>").join("");

function renderStep() {
  progress.querySelectorAll("i").forEach((el, i) => el.classList.toggle("done", i <= step));
  const st = steps[step];
  const back = step > 0 ? `<button class="back" type="button" id="backBtn">&larr; Back</button>` : "";
  let body = "";
  if (st.type === "text") {
    body = `<textarea id="field" rows="6" maxlength="3000" placeholder="Write as much or as little as you like…">${answers.message}</textarea>
      <div class="qnav"><button class="btn" id="nextBtn">Continue</button>${back}</div>`;
  } else if (st.type === "contact") {
    body = `
      <label for="name">Your name *</label><input id="name" maxlength="120" value="${answers.name.replace(/"/g, "&quot;")}" />
      <label for="email">Email *</label><input id="email" type="email" maxlength="160" value="${answers.email.replace(/"/g, "&quot;")}" />
      <p class="qmsg" id="qmsg"></p>
      <div class="qnav"><button class="btn" id="nextBtn">Send it flying</button>${back}</div>`;
  } else {
    body = `<div class="choices">${st.options
      .map((o) => {
        const picked = st.multi ? answers.services.includes(o) : answers[st.key] === o;
        return `<button type="button" data-o="${o.replace(/"/g, "&quot;")}" class="${picked ? "picked" : ""}">${o}</button>`;
      })
      .join("")}</div>
      <p class="qmsg" id="qmsg"></p>
      <div class="qnav">${st.multi ? `<button class="btn" id="nextBtn">Continue</button>` : ""}${back}</div>`;
  }
  quiz.innerHTML = `<div class="qcard reveal in"><h2>${st.q}</h2><p class="sub">${st.sub}</p>${body}</div>`;

  quiz.querySelectorAll(".choices button").forEach((b) =>
    b.addEventListener("click", () => {
      const o = b.dataset.o;
      if (st.multi) {
        const arr = answers.services;
        arr.includes(o) ? arr.splice(arr.indexOf(o), 1) : arr.push(o);
        b.classList.toggle("picked");
      } else {
        answers[st.key] = o;
        next();
      }
    })
  );
  const nextBtn = document.getElementById("nextBtn");
  if (nextBtn) nextBtn.addEventListener("click", next);
  const backBtn = document.getElementById("backBtn");
  if (backBtn) backBtn.addEventListener("click", () => { step--; renderStep(); });
}

async function next() {
  const st = steps[step];
  const msg = document.getElementById("qmsg");
  if (st.multi && !answers.services.length) {
    msg.textContent = "Pick at least one, or choose Not sure yet.";
    return;
  }
  if (st.type === "text") answers.message = document.getElementById("field").value.trim();
  if (st.type === "contact") {
    answers.name = document.getElementById("name").value.trim();
    answers.email = document.getElementById("email").value.trim();
    if (!answers.name || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(answers.email)) {
      msg.textContent = "I need a name and a working email to reply.";
      return;
    }
    // Static host (GitHub Pages) — no backend. The brief is composed into an
    // email the visitor sends from their own mail client.
    const STUDIO_EMAIL = "crescentbutterfly23@gmail.com";
    const body = [
      `Name:      ${answers.name}`,
      `Email:     ${answers.email}`,
      "",
      `Services:  ${answers.services.join(", ") || "—"}`,
      `Stage:     ${answers.stage || "—"}`,
      `Timeline:  ${answers.timeline || "—"}`,
      `Budget:    ${answers.budget || "—"}`,
      "",
      "The story:",
      answers.message || "—",
      "",
      "— sent from crescentbutterfly.design",
    ].join("\n");
    const mailto =
      `mailto:${STUDIO_EMAIL}` +
      `?subject=${encodeURIComponent(`Project brief — ${answers.name}`)}` +
      `&body=${encodeURIComponent(body)}`;

    progress.style.display = "none";
    quiz.innerHTML = `
      <div class="done-card reveal in">
        <span class="icon done-icon"><svg class="ic"><use href="#ic-butterfly" /></svg></span>
        <h2>One last tap.</h2>
        <p>Thanks, ${answers.name.split(" ")[0]} — your brief is ready to go. Hit the button and it'll
           open in your email, already filled in. Send it and it lands straight in my studio.</p>
        <a class="btn" id="sendBrief" href="${mailto}">Send my brief</a>
        <p class="qmsg" style="margin-top:1.4rem">
          Email not opening? Copy it across to
          <a href="mailto:${STUDIO_EMAIL}" style="color:inherit;text-decoration:underline">${STUDIO_EMAIL}</a>.
        </p>
        <p style="margin-top:1.4rem"><a class="btn ghost" href="work.html">Browse the work meanwhile</a></p>
      </div>`;
    document.getElementById("sendBrief").focus();
    return;
  }
  step++;
  renderStep();
}
renderStep();
</script>
</body>
</html>
